name: Publish Easy NPX to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "npm version to publish, for example 0.1.44-easy.1"
        required: true
        type: string
      npm_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - beta
      publish_mode:
        description: "Use dry-run first when changing this workflow"
        required: true
        default: "publish"
        type: choice
        options:
          - publish
          - dry-run

concurrency:
  group: publish-easy-npx
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: 22.22.1
  PNPM_VERSION: 10.13.1
  RUST_TOOLCHAIN: nightly-2025-12-04
  CARGO_INCREMENTAL: "0"
  VITE_VK_SHARED_API_BASE: ""
  VK_SHARED_API_BASE: ""

jobs:
  publish-windows-x64:
    name: Build Windows x64 and publish npm package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.12.0

      - name: Validate requested npm version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          node -e "
            const version = process.env.VERSION;
            if (!/^[0-9]+\.[0-9]+\.[0-9]+-easy\.[0-9]+$/.test(version)) {
              throw new Error('Version must look like 0.1.44-easy.1');
            }
          "
          if npm view "easy-vibe-kanban@$VERSION" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "easy-vibe-kanban@$VERSION already exists on npm."
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-pc-windows-msvc

      - name: Install Windows cross-compilation dependencies
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            zip \
            clang-19 \
            clang-tools-19 \
            llvm-19 \
            lld-19 \
            nasm \
            cmake \
            ninja-build
          echo "/usr/lib/llvm-19/bin" >> "$GITHUB_PATH"

      - name: Install cargo-xwin
        uses: taiki-e/cache-cargo-install-action@34ce5120836e5f9f1508d8713d7fdea0e8facd6f
        with:
          tool: cargo-xwin
          git: https://github.com/rust-cross/cargo-xwin
          rev: 635a9559d49d719e79e0f60d92eb44447faf3212

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local web app
        run: pnpm --filter @vibe/local-web run build

      - name: Build Windows binaries
        run: |
          cargo xwin build \
            --cross-compiler clang-cl \
            --release \
            --target x86_64-pc-windows-msvc \
            -p server \
            -p mcp \
            -p review \
            --bin server \
            --bin vibe-kanban-mcp \
            --bin review

      - name: Package Windows zip files
        run: |
          set -euo pipefail
          rm -rf npx-cli/dist package-tmp
          mkdir -p npx-cli/dist/windows-x64
          mkdir -p package-tmp/vibe-kanban package-tmp/vibe-kanban-mcp package-tmp/vibe-kanban-review

          cp target/x86_64-pc-windows-msvc/release/server.exe package-tmp/vibe-kanban/vibe-kanban.exe
          cp target/x86_64-pc-windows-msvc/release/vibe-kanban-mcp.exe package-tmp/vibe-kanban-mcp/vibe-kanban-mcp.exe
          cp target/x86_64-pc-windows-msvc/release/review.exe package-tmp/vibe-kanban-review/vibe-kanban-review.exe

          (cd package-tmp/vibe-kanban && zip -q ../../npx-cli/dist/windows-x64/vibe-kanban.zip vibe-kanban.exe)
          (cd package-tmp/vibe-kanban-mcp && zip -q ../../npx-cli/dist/windows-x64/vibe-kanban-mcp.zip vibe-kanban-mcp.exe)
          (cd package-tmp/vibe-kanban-review && zip -q ../../npx-cli/dist/windows-x64/vibe-kanban-review.zip vibe-kanban-review.exe)

          ls -la npx-cli/dist/windows-x64

      - name: Build and pack NPX package
        id: pack
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          cd npx-cli
          npm ci
          npm pkg set version="$VERSION"
          npm run build
          node -e "if (require('./package.json').version !== process.env.VERSION) throw new Error('package version was not updated')"
          npm pack --json > pack-output.json
          PACKAGE_FILE=$(node -e "console.log(require('./pack-output.json')[0].filename)")
          echo "package-file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"
          echo "Packed $PACKAGE_FILE"

      - name: Publish package to npm
        if: inputs.publish_mode == 'publish'
        run: |
          set -euo pipefail
          cd npx-cli
          npm publish "${{ steps.pack.outputs.package-file }}" \
            --provenance \
            --access public \
            --tag "${{ inputs.npm_tag }}" \
            --registry https://registry.npmjs.org/

      - name: Dry-run npm publish
        if: inputs.publish_mode == 'dry-run'
        run: |
          set -euo pipefail
          cd npx-cli
          npm publish "${{ steps.pack.outputs.package-file }}" \
            --dry-run \
            --access public \
            --tag "${{ inputs.npm_tag }}" \
            --registry https://registry.npmjs.org/

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easy-vibe-kanban-${{ inputs.version }}-windows-x64-npx
          path: |
            npx-cli/*.tgz
            npx-cli/dist/windows-x64/*.zip
          if-no-files-found: error
